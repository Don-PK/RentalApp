services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rental_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rental_user} -d ${POSTGRES_DB:-rental_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rental_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rental_user}:${POSTGRES_PASSWORD:-rental_pass}@db:5432/${POSTGRES_DB:-rental_db}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5000:5000"

  # ─── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # /api is proxied by Nginx to the backend container — no host needed
        VITE_API_BASE_URL: /api
    container_name: rental_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
