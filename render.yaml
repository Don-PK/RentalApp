# Render manifest for reproducible service + DB setup
# Update names and env var values after creating services in Render dashboard.

services:
  - type: web
    name: rental-backend
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: rental-db
      - key: JWT_SECRET
        sync: false
    repo: .
    branch: main
    rootDir: backend

databases:
  - name: rental-db
    engine: postgres
    plan: free
